<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bird Quiz for Adam (Czech)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Bird Quiz for Adam</h1>
        <div class="stats">
          <div>
            <div class="label">Score</div>
            <div id="score" class="value">0</div>
          </div>
          <div>
            <div class="label">Round</div>
            <div id="round" class="value">1 / 15</div>
          </div>
        </div>
      </header>

      <section id="quiz" class="quiz" aria-live="polite">
        <div class="prompt">
          <div class="imageWrap">
            <img id="birdImage" alt="Bird" class="birdImage" />
          </div>
        </div>

        <form id="answerForm" class="answerForm" autocomplete="off" aria-label="Type your answer">
          <label class="answerLabel" for="answerInput">Bird name (Czech)</label>
          <div class="answerRow">
            <input
              id="answerInput"
              class="answerInput"
              type="text"
              name="answer"
              inputmode="text"
              spellcheck="false"
              autocapitalize="off"
              autocomplete="off"
              placeholder="Type the name…"
            />
            <button id="answerSubmit" class="answerSubmit" type="submit">Answer</button>
          </div>
        </form>

        <div class="feedback" aria-live="polite">
          <div id="feedbackText" class="feedbackText"></div>
          <div id="correctReveal" class="correctReveal" hidden></div>
        </div>

        <div class="controls">
          <button id="nextBtn" class="nextBtn" type="button" disabled>Next</button>
          <button id="restartBtn" class="nextBtn secondary" type="button" hidden>Restart</button>
        </div>

        <section class="birdInfo" aria-live="polite">
          <div class="birdInfoTitle">Bird info</div>
          <div id="birdInfoBox" class="birdInfoBox" hidden></div>
        </section>
      </section>

      <section id="loading" class="loading" aria-live="polite">
        <div class="loadingCard">
          <div class="spinner" aria-hidden="true"></div>
          <div class="loadingText">Loading birds...</div>
        </div>
      </section>
    </main>

    <script defer src="./app.js?v=2"></script>
  </body>
</html>
