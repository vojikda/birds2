<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ptačí kvíz pro Adama</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <h1>Ptačí kvíz pro Adama</h1>
        <div id="stats" class="stats" hidden>
          <div>
            <div class="label">Skóre</div>
            <div id="score" class="value">0</div>
          </div>
          <div>
            <div class="label">Kolo</div>
            <div id="round" class="value">1 / 15</div>
          </div>
        </div>
      </header>

      <section id="modeMenu" class="quiz modeMenu" aria-live="polite">
        <div class="modeTitle">Vyber režim</div>
        <p class="modeText">Zvol „Hra“ pro kvíz, nebo „Učení“ pro prohlížení všech ptáků a jejich názvů.</p>
        <div class="modeActions">
          <button id="startGameBtn" class="nextBtn" type="button">Hra</button>
          <button id="startLearningBtn" class="nextBtn secondary" type="button">Učení</button>
        </div>
      </section>

      <section id="quiz" class="quiz" aria-live="polite" hidden>
        <div class="topBar">
          <button id="backFromQuizBtn" class="nextBtn secondary" type="button">Zpět na režimy</button>
        </div>
        <div class="prompt">
          <div class="imageWrap">
            <img id="birdImage" alt="Bird" class="birdImage" />
          </div>
        </div>

        <form id="answerForm" class="answerForm" autocomplete="off" aria-label="Napiš odpověď">
          <label class="answerLabel" for="answerInput">Název ptáka (česky)</label>
          <div class="answerRow">
            <input
              id="answerInput"
              class="answerInput"
              type="text"
              name="answer"
              inputmode="text"
              spellcheck="false"
              autocapitalize="off"
              autocomplete="off"
              placeholder="Napiš název…"
            />
            <button id="answerSubmit" class="answerSubmit" type="submit">Odpovědět</button>
          </div>
        </form>

        <div class="feedback" aria-live="polite">
          <div id="feedbackText" class="feedbackText"></div>
          <div id="correctReveal" class="correctReveal" hidden></div>
        </div>

        <div class="controls">
          <button id="nextBtn" class="nextBtn" type="button" disabled>Další</button>
          <button id="restartBtn" class="nextBtn secondary" type="button" hidden>Restart</button>
        </div>

        <section class="birdInfo" aria-live="polite">
          <div class="birdInfoTitle">Informace o ptákovi</div>
          <div id="birdInfoBox" class="birdInfoBox" hidden></div>
        </section>
      </section>

      <section id="learning" class="quiz learning" aria-live="polite" hidden>
        <div class="topBar">
          <button id="backFromLearningBtn" class="nextBtn secondary" type="button">Zpět na režimy</button>
        </div>
        <div class="modeTitle">Režim učení</div>
        <p class="modeText">Prohlédni si všechny fotky a správné názvy ptáků.</p>
        <div id="learningGrid" class="learningGrid"></div>
      </section>

      <section id="loading" class="loading" aria-live="polite">
        <div class="loadingCard">
          <div class="spinner" aria-hidden="true"></div>
          <div class="loadingText">Načítám ptáky…</div>
        </div>
      </section>
    </main>

    <script defer src="./app.js?v=12"></script>
  </body>
</html>
